<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CV Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-LN+7fdVzj6u52u30Kp6M/trliBMCMKTyK833zpbD+pXdCLuTusPj697FH4R/5mcr" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js" integrity="sha384-ndDqU0Gzau9qJ1lfW4pNLlhNTkCfHzAVBReH9diLvGRem5+R9g2FzA8ZGN954O5Q" crossorigin="anonymous"></script>
  </head>
  <body>
    <div class="d-flex flex-column" style="gap: 8px; padding: 20px 100px;">
      <h1>CV Generator</h1>
      <div class="mb-3">
        <label for="input" class="form-label">Information file (.json):</label>
        <input class="form-control" type="file" id="input" accept=".json">
      </div>
      <div class="mb-3">
        <label for="face" class="form-label">Image file (.jpg, .jpeg, .png):</label>
        <input class="form-control" type="file" id="face" accept=".jpg, .jpeg, .png">
      </div>
      <div class="form-check">
        <input class="form-check-input" type="checkbox" value="" id="removeDevInfo">
        <label class="form-check-label" for="removeDevInfo">
          Remove developer's info
        </label>
      </div>
      <button type="button" class="btn btn-primary" id="generate">Generate CV</button>
      <a href="https://github.com/AkienMain/cv-generator" target="_blank">GitHub</a>
    </div>
    <script>
      document.getElementById('input').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
          sessionStorage.setItem('inputFile', e.target.result);
        };
        reader.readAsText(file);
      });
      document.getElementById('face').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
          sessionStorage.setItem('imageFile', e.target.result);
        };
        reader.readAsDataURL(file);
      });
      document.getElementById('generate').addEventListener('click', function(e) {
        let removeDevInfo = document.getElementById('removeDevInfo');
        let link = 'cv.html';
        if (!removeDevInfo.checked) link += '?devInfo=true';
        window.location.href = link;
      });
    </script>
  </body>
</html>
